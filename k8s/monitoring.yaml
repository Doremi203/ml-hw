apiVersion: v1
kind: ConfigMap
metadata:
  name: vmagent-config
  namespace: mlhw
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: ml-rest
        metrics_path: /metrics
        static_configs:
          - targets:
              - ml-rest.mlhw.svc.cluster.local:8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoriametrics
  namespace: mlhw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: victoriametrics
  template:
    metadata:
      labels:
        app: victoriametrics
    spec:
      containers:
        - name: victoriametrics
          image: victoriametrics/victoria-metrics:latest
          args:
            - "-retentionPeriod=7"
          ports:
            - containerPort: 8428
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: victoriametrics
  namespace: mlhw
spec:
  selector:
    app: victoriametrics
  ports:
    - name: http
      port: 8428
      targetPort: 8428
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmagent
  namespace: mlhw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vmagent
  template:
    metadata:
      labels:
        app: vmagent
    spec:
      containers:
        - name: vmagent
          image: victoriametrics/vmagent:latest
          args:
            - "-promscrape.config=/etc/vmagent/prometheus.yml"
            - "-remoteWrite.url=http://victoriametrics:8428/api/v1/write"
          volumeMounts:
            - name: vmagent-config
              mountPath: /etc/vmagent
      volumes:
        - name: vmagent-config
          configMap:
            name: vmagent-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: mlhw
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        type: prometheus
        access: proxy
        isDefault: true
        url: http://victoriametrics:8428
        jsonData:
          httpMethod: GET
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: mlhw
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: ml-service
        orgId: 1
        folder: ML Service
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-ml-service
  namespace: mlhw
data:
  ml-service-dashboard.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "id": 1,
          "title": "RPS by endpoint",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"ml-rest\"}[1m])) by (handler, method)",
              "legendFormat": "{{method}} {{handler}}"
            }
          ],
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 }
        },
        {
          "id": 2,
          "title": "Error rate % by endpoint",
          "type": "timeseries",
          "targets": [
            {
              "expr": "100 * sum(rate(http_requests_total{job=\"ml-rest\",status=~\"4..|5..\"}[5m])) by (handler) / clamp_min(sum(rate(http_requests_total{job=\"ml-rest\"}[5m])) by (handler), 1e-9)",
              "legendFormat": "{{handler}}"
            }
          ],
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 }
        },
        {
          "id": 3,
          "title": "HTTP latency p50/p95/p99",
          "type": "timeseries",
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{job=\"ml-rest\"}[5m])) by (le, handler))",
              "legendFormat": "p50 {{handler}}"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"ml-rest\"}[5m])) by (le, handler))",
              "legendFormat": "p95 {{handler}}"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=\"ml-rest\"}[5m])) by (le, handler))",
              "legendFormat": "p99 {{handler}}"
            }
          ],
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 }
        },
        {
          "id": 4,
          "title": "Model inference latency p50/p95",
          "type": "timeseries",
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(ml_inference_duration_seconds_bucket{status=\"success\"}[5m])) by (le))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(ml_inference_duration_seconds_bucket{status=\"success\"}[5m])) by (le))",
              "legendFormat": "p95"
            }
          ],
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 }
        },
        {
          "id": 5,
          "title": "Inference error rate %",
          "type": "timeseries",
          "targets": [
            {
              "expr": "100 * sum(rate(ml_inference_requests_total{status=\"error\"}[5m])) / clamp_min(sum(rate(ml_inference_requests_total[5m])), 1e-9)",
              "legendFormat": "inference"
            }
          ],
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 }
        }
      ],
      "refresh": "15s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["ml", "prometheus", "victoriametrics"],
      "templating": { "list": [] },
      "time": { "from": "now-30m", "to": "now" },
      "timepicker": {},
      "timezone": "",
      "title": "ML Service Observability",
      "version": 1,
      "weekStart": ""
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: mlhw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources/datasource.yaml
              subPath: datasource.yaml
            - name: grafana-dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards/provider.yaml
              subPath: provider.yaml
            - name: grafana-dashboard-ml-service
              mountPath: /var/lib/grafana/dashboards/ml-service-dashboard.json
              subPath: ml-service-dashboard.json
      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: grafana-dashboard-ml-service
          configMap:
            name: grafana-dashboard-ml-service
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: mlhw
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30030


